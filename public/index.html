<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConstructAi</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <!-- SVG logo definition (reused via <use>) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="ccLogo" viewBox="0 0 64 64">
        <!-- Top ridge cap -->
        <rect x="27" y="8" width="10" height="15" rx="2" fill="#f97316"/>
        <!-- Helmet dome -->
        <path d="M 11 44 Q 11 19 32 19 Q 53 19 53 44 Z" fill="#f97316"/>
        <!-- Brim -->
        <path d="M 7 48 Q 7 44 11 44 L 53 44 Q 57 44 57 48 L 57 50 Q 57 54 53 54 L 11 54 Q 7 54 7 50 Z" fill="#f97316"/>
        <!-- Air vent slits (dark cut-outs) -->
        <rect x="22" y="26" width="3.5" height="14" rx="1.5" fill="#0a0a0a"/>
        <rect x="38.5" y="26" width="3.5" height="14" rx="1.5" fill="#0a0a0a"/>
        <!-- White brim strap line -->
        <line x1="14" y1="49" x2="50" y2="49" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 64 64" aria-hidden="true"><use href="#ccLogo"/></svg>
        <span class="brand-name">ConstructAi</span>
      </div>
      <button class="btn-new-chat" id="btnNewChat" title="Nouvelle conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-section-label">Conversations</div>
    <nav class="chat-list" id="chatList"></nav>

    <div class="sidebar-footer">
      <div class="doc-badge">
        <span class="badge-dot"></span>
        CNB · CNÉB · CNP · CNPI 2025
      </div>
      <div class="model-badge">claude-sonnet-4-6</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <button class="sidebar-toggle" id="sidebarToggle" title="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Welcome screen -->
    <section class="welcome" id="welcome">
      <svg class="welcome-icon" viewBox="0 0 64 64" aria-hidden="true"><use href="#ccLogo"/></svg>
      <h1 class="welcome-title">ConstructAi</h1>
      <p class="welcome-sub">Assistant expert en construction — Québec &amp; Canada</p>
    </section>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="inputText"
          placeholder="Posez votre question en construction…"
          rows="1"
        ></textarea>
        <button class="btn-send" id="btnSend" title="Envoyer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Shift+Entrée pour nouvelle ligne · Entrée pour envoyer</p>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
