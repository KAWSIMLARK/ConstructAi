<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concierge Construction</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-icon">🏗️</span>
        <span class="brand-name">Concierge<br>Construction</span>
      </div>
      <button class="btn-new-chat" id="btnNewChat" title="Nouvelle conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-section-label">Conversations</div>
    <nav class="chat-list" id="chatList"></nav>

    <div class="sidebar-footer">
      <div class="doc-badge">
        <span class="badge-dot"></span>
        CNB 2020 · CCQ · Code civil QC
      </div>
      <div class="model-badge">claude-sonnet-4-6</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <button class="sidebar-toggle" id="sidebarToggle" title="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Welcome screen -->
    <section class="welcome" id="welcome">
      <div class="welcome-icon">🏗️</div>
      <h1 class="welcome-title">Concierge Construction</h1>
      <p class="welcome-sub">Assistant expert en construction — Québec &amp; Canada</p>
      <div class="suggestions">
        <button class="suggestion-btn" data-q="Quelle est la distance minimale entre une fenêtre et la limite de propriété voisine au Québec?">
          🪟 Distance fenêtre / voisin
        </button>
        <button class="suggestion-btn" data-q="Quelles sont les exigences d'isolation thermique pour les murs extérieurs selon le CNB 2020 en zone climatique 6?">
          🌡️ Isolation murs CNB 2020
        </button>
        <button class="suggestion-btn" data-q="Quels sont les éléments obligatoires d'un devis de construction au Québec?">
          📋 Devis de construction QC
        </button>
        <button class="suggestion-btn" data-q="Quelles sont les charges de neige à prévoir pour une toiture plate à Montréal selon le CNB 2020?">
          ❄️ Charges de neige Montréal
        </button>
      </div>
    </section>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="inputText"
          placeholder="Posez votre question en construction…"
          rows="1"
        ></textarea>
        <button class="btn-send" id="btnSend" title="Envoyer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Shift+Entrée pour nouvelle ligne · Entrée pour envoyer</p>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
